trigger:
- main

variables:
  imageNameBackend: "subscription-backend"
  imageNameFrontend: "subscription-frontend"
  registry: "subsmanagement-bwdmfyg0b5b3dfcj.azurecr.io"
  tag: '$(Build.BuildId)'

stages:
  - stage: Build
    displayName: "Build and Push Stage"
    jobs:
      - job: BuildAndPush
        pool:
          name: 'Default' # Points to your WSL Agent
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          # Backend Build & Test
          - script: |
              cd backend
              npm install
              npm test || echo "No tests defined yet"
            displayName: 'Install & Test Backend'

          # Docker Login using Service Connection (Recommended)
          # Note: Ensure you created 'MyACRConnection' in Project Settings
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              containerRegistry: 'MyACRConnection'
              command: 'login'

          # Build and Push Backend
          - task: Docker@2
            displayName: 'Build and Push Backend'
            inputs:
              repository: $(imageNameBackend)
              command: 'buildAndPush'
              Dockerfile: './backend/Dockerfile'
              tags: |
                $(tag)
                latest

          # Build and Push Frontend
          - task: Docker@2
            displayName: 'Build and Push Frontend'
            inputs:
              repository: $(imageNameFrontend)
              command: 'buildAndPush'
              Dockerfile: './frontend/Dockerfile'
              tags: |
                $(tag)
                latest
