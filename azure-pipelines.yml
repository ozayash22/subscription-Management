trigger:
  - main

variables:
  # Reference your variable group here if ACR_USERNAME is stored there
  # group: my-variable-group 
  imageNameBackend: "subscription-backend"
  imageNameFrontend: "subscription-frontend"
  registry: "subsmanagement-bwdmfyg0b5b3dfcj.azurecr.io"
  # Best practice: use a 'tag' variable
  tag: '$(Build.BuildId)'

stages:
  - stage: Build
    displayName: "Build and Push Stage"
    jobs:
      - job: BuildAndPush
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: "20.x" # Node 24 is very new; 20.x is the current stable LTS
            displayName: "Install Node.js"

          - script: |
              cd backend
              npm install
            displayName: "Install Backend Dependencies"

          # Use the built-in Docker task for Login/Build/Push 
          # This avoids manually echo-ing passwords in logs
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              containerRegistry: 'MyACRConnection' # Name of your Service Connection
              command: 'login'

          - script: |
              docker build -t $(registry)/$(imageNameBackend):$(tag) ./backend
              docker build -t $(registry)/$(imageNameFrontend):$(tag) ./frontend
            displayName: "Build Docker Images"

          - script: |
              docker push $(registry)/$(imageNameBackend):$(tag)
              docker push $(registry)/$(imageNameFrontend):$(tag)
            displayName: "Push Docker Images"